# Managed Postgres so synced reports survive restarts/redeploys.
# (Free SQLite on Render lives on an ephemeral disk and is wiped on every restart.)
databases:
  - name: logistic-factory-db
    plan: free
    region: ohio
    databaseName: logistic_factory
    user: logistic_factory

services:
  # 1. API Backend (Python FastAPI)
  - type: web
    name: logistic-factory-api
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Injected automatically from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: logistic-factory-db
          property: connectionString

  # 2. Frontend Web (React / Vite)
  - type: web
    name: logistic-factory-web
    env: static
    buildCommand: "cd web && npm install && npm run build"
    staticPublishPath: ./web/dist
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      # Vite freezes VITE_* at BUILD time. This must be the real API URL,
      # NOT a placeholder. A wrong value here is what broke web<->app sync.
      - key: VITE_API_URL
        value: https://logistic-factory-api.onrender.com
