services:
  # 1. API Backend (Python FastAPI)
  - type: web
    name: logistic-factory-api
    env: python
    region: ohio
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      # Persistent Postgres connection string (e.g. Neon). Set MANUALLY in the
      # Render dashboard, not in git: it's a secret, and an external DB avoids
      # Render's "one free database per account" limit. If unset, the API falls
      # back to ephemeral SQLite (data is lost on every restart).
      - key: DATABASE_URL
        sync: false
      # JWT_SECRET / ADMIN_USERNAME / ADMIN_PASSWORD se configuran en el dashboard
      # (no aquí) para no bloquear el Blueprint. El código usa valores por defecto
      # si no están: admin/admin123 y un secreto de desarrollo.

  # 2. Frontend Web (React / Vite)
  - type: web
    name: logistic-factory-web
    env: static
    buildCommand: "cd web && npm install && npm run build"
    staticPublishPath: ./web/dist
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      # Vite freezes VITE_* at BUILD time. Must be the real API URL,
      # NOT a placeholder. A wrong value here breaks web<->app sync.
      - key: VITE_API_URL
        value: https://logistic-factory-api.onrender.com
